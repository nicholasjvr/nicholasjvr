<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-label="AI labour development, neon vapourware edition">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050810"/>
      <stop offset="45%" stop-color="#0B0F19"/>
      <stop offset="100%" stop-color="#12061F"/>
    </linearGradient>
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F7FF"/>
      <stop offset="50%" stop-color="#00FFD5"/>
      <stop offset="100%" stop-color="#00F7FF"/>
    </linearGradient>
    <linearGradient id="neonPink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF006E"/>
      <stop offset="50%" stop-color="#FF00AA"/>
      <stop offset="100%" stop-color="#FF006E"/>
    </linearGradient>
    <linearGradient id="neonPurple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B026FF"/>
      <stop offset="100%" stop-color="#6B00FF"/>
    </linearGradient>
    <linearGradient id="holo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F7FF" stop-opacity="0.9"/>
      <stop offset="35%" stop-color="#FF00AA" stop-opacity="0.85"/>
      <stop offset="70%" stop-color="#B026FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#39FF14" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowPink" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowHeavy" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00F7FF" stroke-width="0.5" opacity="0.08"/>
    </pattern>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#000" opacity="0.18"/>
    </pattern>
    <pattern id="dots" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#FF00AA" opacity="0.15"/>
    </pattern>
    <clipPath id="frameClip">
      <rect x="24" y="24" width="1152" height="372" rx="12"/>
    </clipPath>
  </defs>

  <!-- base -->
  <rect width="1200" height="420" fill="url(#bg)"/>
  <rect width="1200" height="420" fill="url(#grid)"/>
  <rect width="1200" height="420" fill="url(#dots)"/>

  <!-- perspective wireframe floor -->
  <g opacity="0.35" clip-path="url(#frameClip)">
    <path d="M0 340 L1200 340" stroke="#00F7FF" stroke-width="1" opacity="0.3"/>
    <path d="M100 420 L600 260 L1100 420" fill="none" stroke="#B026FF" stroke-width="1" opacity="0.25"/>
    <path d="M200 420 L600 280 L1000 420" fill="none" stroke="#FF00AA" stroke-width="0.8" opacity="0.2"/>
    <path d="M300 420 L600 300 L900 420" fill="none" stroke="#00F7FF" stroke-width="0.6" opacity="0.18"/>
    <line x1="600" y1="240" x2="600" y2="420" stroke="#00F7FF" stroke-width="0.8" opacity="0.25"/>
    <line x1="400" y1="340" x2="800" y2="340" stroke="#FF00AA" stroke-width="0.6" opacity="0.2"/>
  </g>

  <!-- outer frame: triple border anarchy -->
  <rect x="12" y="12" width="1176" height="396" rx="16" fill="none" stroke="#1E293B" stroke-width="1"/>
  <rect x="20" y="20" width="1160" height="380" rx="14" fill="none" stroke="url(#neonPink)" stroke-width="1" opacity="0.55" stroke-dasharray="8 6"/>
  <rect x="28" y="28" width="1144" height="364" rx="12" fill="none" stroke="url(#neonCyan)" stroke-width="1.5" opacity="0.7" filter="url(#glowCyan)"/>

  <!-- corner brackets -->
  <g stroke="#00F7FF" stroke-width="2" fill="none" filter="url(#glowCyan)" opacity="0.9">
    <path d="M48 48 H88 V68"/><path d="M1152 48 H1112 V68"/>
    <path d="M48 372 H88 V352"/><path d="M1152 372 H1112 V352"/>
  </g>
  <g stroke="#FF00AA" stroke-width="1.5" fill="none" opacity="0.7">
    <path d="M56 56 H96 V76"/><path d="M1144 56 H1104 V76"/>
    <path d="M56 364 H96 V344"/><path d="M1144 364 H1104 V344"/>
  </g>

  <!-- top status bar -->
  <rect x="56" y="44" width="1088" height="28" rx="4" fill="#0F172A" stroke="#334155" stroke-width="1"/>
  <circle cx="74" cy="58" r="4" fill="#39FF14" filter="url(#glowCyan)"/>
  <circle cx="90" cy="58" r="4" fill="#FF00AA" opacity="0.8"/>
  <circle cx="106" cy="58" r="4" fill="#00F7FF" opacity="0.8"/>
  <text x="124" y="62" fill="#64748B" font-family="ui-monospace, monospace" font-size="11" letter-spacing="2">SYS://AIRTIFFICIAL_LABOUR v4.2.0 // NON-SENTIENT // DEPLOYED // NO REGRETS</text>
  <text x="980" y="62" fill="#00F7FF" font-family="ui-monospace, monospace" font-size="11" opacity="0.8">[ ONLINE ]</text>

  <!-- glitch headline layers -->
  <text x="82" y="118" fill="#FF00AA" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="800" letter-spacing="-1" opacity="0.35">AI LABOUR DEVELOPMENT</text>
  <text x="78" y="114" fill="#00F7FF" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="800" letter-spacing="-1" opacity="0.25">AI LABOUR DEVELOPMENT</text>
  <text x="80" y="116" fill="url(#holo)" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="800" letter-spacing="-1" filter="url(#glowHeavy)">AI LABOUR DEVELOPMENT</text>

  <!-- subhead -->
  <text x="80" y="152" fill="#94A3B8" font-family="ui-monospace, monospace" font-size="14" letter-spacing="1">HUMAN-DIRECTED // MACHINE-ACCELERATED // VAPOURWARE-APPROVED</text>

  <!-- decorative connector line -->
  <line x1="80" y1="168" x2="420" y2="168" stroke="url(#neonCyan)" stroke-width="2" filter="url(#glowCyan)"/>
  <line x1="420" y1="168" x2="480" y2="168" stroke="#FF00AA" stroke-width="2" stroke-dasharray="4 4" opacity="0.8"/>
  <polygon points="484,168 476,164 476,172" fill="#FF00AA"/>

  <!-- badge row 1: primary agents -->
  <g font-family="ui-monospace, monospace" font-size="13" font-weight="600">
    <rect x="80" y="188" width="96" height="34" rx="6" fill="#111827" stroke="#00F7FF" stroke-width="1.5" filter="url(#glowCyan)"/>
    <text x="128" y="210" fill="#00F7FF" text-anchor="middle">CURSOR</text>

    <rect x="188" y="188" width="110" height="34" rx="6" fill="#111827" stroke="#FF00AA" stroke-width="1.2" opacity="0.95"/>
    <text x="243" y="210" fill="#FF00AA" text-anchor="middle">WINDSURF</text>

    <rect x="310" y="188" width="78" height="34" rx="6" fill="#111827" stroke="#B026FF" stroke-width="1.2"/>
    <text x="349" y="210" fill="#B026FF" text-anchor="middle">CLINE</text>

    <rect x="400" y="188" width="98" height="34" rx="6" fill="#111827" stroke="#39FF14" stroke-width="1.2"/>
    <text x="449" y="210" fill="#39FF14" text-anchor="middle">CONTINUE</text>

    <rect x="510" y="188" width="100" height="34" rx="6" fill="#111827" stroke="#00F7FF" stroke-width="1"/>
    <text x="560" y="210" fill="#94A3B8" text-anchor="middle">KILO CODE</text>

    <rect x="622" y="188" width="118" height="34" rx="6" fill="#111827" stroke="#64748B" stroke-width="1"/>
    <text x="681" y="210" fill="#64748B" text-anchor="middle">COPILOT HQ</text>

    <rect x="752" y="188" width="88" height="34" rx="6" fill="#111827" stroke="#FF9900" stroke-width="1"/>
    <text x="796" y="210" fill="#FF9900" text-anchor="middle">AMAZON Q</text>

    <rect x="852" y="188" width="108" height="34" rx="6" fill="#111827" stroke="#4285F4" stroke-width="1"/>
    <text x="906" y="210" fill="#4285F4" text-anchor="middle">GEMINI</text>

    <rect x="972" y="188" width="148" height="34" rx="6" fill="#1a0a2e" stroke="url(#neonPink)" stroke-width="1.5" stroke-dasharray="3 2" filter="url(#glowPink)"/>
    <text x="1046" y="210" fill="#FF00AA" text-anchor="middle">+ WHATEVER DROPS</text>
  </g>

  <!-- flow diagram: overly designed -->
  <g opacity="0.9">
    <rect x="80" y="248" width="200" height="56" rx="8" fill="#0F172A" stroke="#00F7FF" stroke-width="1.5" filter="url(#glowCyan)"/>
    <text x="180" y="272" fill="#00F7FF" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle" letter-spacing="1">INPUT</text>
    <text x="180" y="290" fill="#F8FAFC" font-family="Inter, sans-serif" font-size="13" text-anchor="middle">your weird idea</text>

    <path d="M280 276 H340" stroke="#00F7FF" stroke-width="2" filter="url(#glowCyan)"/>
    <text x="310" y="268" fill="#64748B" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">FEED</text>

    <rect x="340" y="248" width="220" height="56" rx="8" fill="#1a0a2e" stroke="url(#neonPink)" stroke-width="1.5" filter="url(#glowPink)"/>
    <text x="450" y="272" fill="#FF00AA" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle" letter-spacing="1">AIRTIFFICIAL LABOUR</text>
    <text x="450" y="290" fill="#94A3B8" font-family="Inter, sans-serif" font-size="12" text-anchor="middle">scaffold · explore · iterate</text>

    <path d="M560 276 H620" stroke="#FF00AA" stroke-width="2"/>
    <text x="590" y="268" fill="#64748B" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">BOOST</text>

    <rect x="620" y="248" width="200" height="56" rx="8" fill="#0F172A" stroke="#B026FF" stroke-width="1.5"/>
    <text x="720" y="272" fill="#B026FF" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle" letter-spacing="1">HUMAN LAYER</text>
    <text x="720" y="290" fill="#F8FAFC" font-family="Inter, sans-serif" font-size="13" text-anchor="middle">taste · architecture · yours</text>

    <path d="M820 276 H880" stroke="#B026FF" stroke-width="2"/>
    <text x="850" y="268" fill="#64748B" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">SHIP</text>

    <rect x="880" y="248" width="240" height="56" rx="8" fill="#0a1f0a" stroke="#39FF14" stroke-width="1.5" filter="url(#glowCyan)"/>
    <text x="1000" y="272" fill="#39FF14" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle" letter-spacing="1">OUTPUT</text>
    <text x="1000" y="290" fill="#F8FAFC" font-family="Inter, sans-serif" font-size="13" text-anchor="middle">uniquely yours · very fast</text>
  </g>

  <!-- stat blocks: vapourware metrics -->
  <g font-family="ui-monospace, monospace">
    <rect x="80" y="328" width="160" height="48" rx="6" fill="#111827" stroke="#334155"/>
    <text x="96" y="348" fill="#64748B" font-size="10">THROUGHPUT</text>
    <text x="96" y="366" fill="#00F7FF" font-size="16" font-weight="700">∞ iter/hr</text>

    <rect x="256" y="328" width="160" height="48" rx="6" fill="#111827" stroke="#334155"/>
    <text x="272" y="348" fill="#64748B" font-size="10">SENTIENCE</text>
    <text x="272" y="366" fill="#FF00AA" font-size="16" font-weight="700">0.00%</text>

    <rect x="432" y="328" width="160" height="48" rx="6" fill="#111827" stroke="#334155"/>
    <text x="448" y="348" fill="#64748B" font-size="10">REGRET</text>
    <text x="448" y="366" fill="#39FF14" font-size="16" font-weight="700">NONE</text>

    <rect x="608" y="328" width="160" height="48" rx="6" fill="#111827" stroke="#334155"/>
    <text x="624" y="348" fill="#64748B" font-size="10">ERA STATUS</text>
    <text x="624" y="366" fill="url(#neonCyan)" font-size="16" font-weight="700">LOVED</text>

    <rect x="784" y="328" width="336" height="48" rx="6" fill="#1a0a2e" stroke="url(#neonPink)" stroke-width="1" stroke-dasharray="6 4"/>
    <text x="800" y="348" fill="#64748B" font-size="10">DISCLAIMER</text>
    <text x="800" y="366" fill="#94A3B8" font-size="11">may hallucinate libraries. human still required. no refunds.</text>
  </g>

  <!-- bottom accent bars -->
  <rect x="80" y="392" width="200" height="4" rx="2" fill="url(#neonCyan)" filter="url(#glowCyan)"/>
  <rect x="290" y="392" width="120" height="4" rx="2" fill="url(#neonPink)" opacity="0.8"/>
  <rect x="420" y="392" width="80" height="4" rx="2" fill="#B026FF" opacity="0.7"/>
  <rect x="510" y="392" width="590" height="4" rx="2" fill="#1E293B"/>
  <rect x="510" y="392" width="340" height="4" rx="2" fill="url(#holo)" opacity="0.6"/>

  <!-- floating decorative elements -->
  <g opacity="0.5" font-family="ui-monospace, monospace" font-size="10" fill="#00F7FF">
    <text x="1050" y="140" opacity="0.6">◈ MCP</text>
    <text x="1080" y="158" fill="#FF00AA" opacity="0.5">◈ BYOK</text>
    <text x="1040" y="176" fill="#B026FF" opacity="0.5">◈ AGENT</text>
  </g>

  <!-- scanline overlay -->
  <rect width="1200" height="420" fill="url(#scanlines)" pointer-events="none" opacity="0.4"/>
</svg>
