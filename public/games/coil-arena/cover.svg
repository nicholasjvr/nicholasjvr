<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Coil Arena cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#3fb950" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>

  <circle cx="800" cy="480" r="320" fill="none" stroke="#f85149" stroke-opacity="0.35" stroke-width="3"/>

  <!-- Food pellets -->
  <circle cx="520" cy="360" r="10" fill="#d2a24c"/>
  <circle cx="980" cy="420" r="8" fill="#3fb950"/>
  <circle cx="720" cy="620" r="9" fill="#58a6ff"/>
  <circle cx="1100" cy="560" r="7" fill="#d2a24c"/>

  <!-- Snake coil -->
  <path d="M 420 520 Q 560 320 760 380 T 1040 500 T 900 680 T 560 620 T 420 520" fill="none" stroke="#3fb950" stroke-width="22" stroke-linecap="round"/>
  <circle cx="420" cy="520" r="18" fill="#e6edf3" stroke="#3fb950" stroke-width="3"/>

  <!-- Bot snake -->
  <path d="M 1180 300 Q 1280 380 1200 500 T 1020 540" fill="none" stroke="#58a6ff" stroke-width="16" stroke-linecap="round" opacity="0.85"/>

  <text x="120" y="200" fill="#f5f4f0" font-family="JetBrains Mono, monospace" font-size="110" font-weight="800" letter-spacing="-0.02em">Coil Arena</text>
  <text x="124" y="270" fill="#3fb950" font-family="JetBrains Mono, monospace" font-size="30" letter-spacing="0.12em">$ ./arena --multiplayer --bots</text>
</svg>
