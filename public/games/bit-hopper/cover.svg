<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Bit Hopper cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#3fb950" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>

  <!-- Platforms -->
  <rect x="180" y="640" width="360" height="12" fill="#3fb950"/>
  <rect x="180" y="652" width="360" height="248" fill="#3fb950" fill-opacity="0.10"/>
  <rect x="640" y="560" width="300" height="12" fill="#3fb950"/>
  <rect x="640" y="572" width="300" height="328" fill="#3fb950" fill-opacity="0.10"/>
  <rect x="1040" y="660" width="380" height="12" fill="#3fb950"/>
  <rect x="1040" y="672" width="380" height="228" fill="#3fb950" fill-opacity="0.10"/>

  <!-- Tokens -->
  <text x="760" y="500" fill="#d2a24c" font-family="JetBrains Mono, monospace" font-size="48" text-anchor="middle">$</text>
  <text x="1200" y="600" fill="#d2a24c" font-family="JetBrains Mono, monospace" font-size="48" text-anchor="middle">$</text>

  <!-- Hazard -->
  <text x="1360" y="648" fill="#f85149" font-family="JetBrains Mono, monospace" font-size="44" text-anchor="middle">#</text>

  <!-- Player -->
  <rect x="300" y="596" width="44" height="52" fill="#e6edf3"/>
  <rect x="308" y="608" width="8" height="8" fill="#3fb950"/>
  <rect x="328" y="608" width="8" height="8" fill="#3fb950"/>

  <text x="120" y="200" fill="#f5f4f0" font-family="JetBrains Mono, monospace" font-size="110" font-weight="800" letter-spacing="-0.02em">Bit Hopper</text>
  <text x="124" y="270" fill="#3fb950" font-family="JetBrains Mono, monospace" font-size="30" letter-spacing="0.12em">$ ./run --platformer</text>
</svg>
